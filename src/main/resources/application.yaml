spring:
  application:
    name: spring-boot-fix-souza
  datasource:
    url: jdbc:mysql://127.0.0.1:3307/gym?createDatabaseIfNotExist=true
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
